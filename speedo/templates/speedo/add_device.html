{% extends 'base.html' %}

{% block title %}Добавление устройства{% endblock %}

{% block content %}
<div class="container mt-4">
    <h1>Добавление устройства</h1>
    
    <div class="card">
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                
                <div class="mb-3">
                    <label for="device_id" class="form-label">ID устройства</label>
                    <input type="text" class="form-control" id="device_id" name="device_id" required>
                    <div class="form-text">Уникальный идентификатор устройства (например, ESP32-001)</div>
                </div>
                
                <div class="mb-3">
                    <label for="device_name" class="form-label">Название устройства</label>
                    <input type="text" class="form-control" id="device_name" name="device_name">
                    <div class="form-text">Дайте устройству понятное название (необязательно)</div>
                </div>
                
                <button type="submit" class="btn btn-primary">Добавить устройство</button>
                <a href="{% url 'device_list' %}" class="btn btn-secondary">Отмена</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}

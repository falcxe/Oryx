<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oryx Speedometer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>
    <!-- Leaflet JavaScript -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
     crossorigin=""></script>
    <link rel="stylesheet" href="/static/speedo/style.css">
</head>
<body>
    <div class="app-container">
        <div class="sidebar">
            <div class="logo-container">
                <div class="logo">
                    <svg viewBox="0 0 40 40" class="logo-icon" width="40" height="40">
                        <path d="M 8 20 a 12 12 0 1 1 24 0" class="logo-o" fill="none" stroke-width="3" />
                        <path d="M20 20 L30 10" class="logo-arrow" stroke-width="2.5" stroke-linecap="round" />
                        <circle cx="20" cy="20" r="2.2" class="logo-center" />
                    </svg>
                    <span class="logo-text">Oryx</span>
                </div>
            </div>
            <div class="nav-links">
                <a href="/" class="nav-link{% if request.path == '/' %} active{% endif %}">
                    <i class="fas fa-tachometer-alt"></i>
                    <span>Дашборд</span>
                </a>
                <a href="/routes/" class="nav-link{% if request.path == '/routes/' or request.path == '/history/' %} active{% endif %}">
                    <i class="fas fa-history"></i>
                    <span>История</span>
                </a>
                <a href="/settings/" class="nav-link{% if request.path == '/settings/' %} active{% endif %}">
                    <i class="fas fa-cog"></i>
                    <span>Настройки</span>
                </a>
            </div>
        </div>
        <div class="main-content">
            <header class="app-header">
                <div class="header-title">
                    <h1>Умный спидометр</h1>
                    <p class="text-muted">Данные в реальном времени</p>
                </div>
                {% block header_extras %}{% endblock %}
            </header>
            {% block content %}{% endblock %}
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Oryx Speedometer{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>
    <!-- Leaflet JavaScript -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
     crossorigin=""></script>
    <link rel="stylesheet" href="/static/speedo/style.css">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="app-container {% if not request.user.is_authenticated %}no-sidebar{% endif %}">
        <!-- Боковое меню - только для авторизованных пользователей -->
        {% if request.user.is_authenticated %}
        <div class="sidebar">
            <div class="logo-container">
                <a href="{% url 'home' %}" class="logo">
                    <div class="logo-icon">
                        <svg width="36" height="36" viewBox="0 0 36 36">
                            <circle class="logo-circle" cx="18" cy="18" r="16" />
                            <path class="logo-needle" d="M18,18 L18,6" />
                            <circle class="logo-center" cx="18" cy="18" r="3" />
                    </svg>
                </div>
                    <div class="logo-text">Oryx</div>
                </a>
            </div>
            
            <div class="nav-links">
                <a href="{% url 'dashboard' %}" class="nav-link {% if request.path == '/dashboard/' %}active{% endif %}">
                    <i class="fas fa-tachometer-alt"></i>
                    <span>Дашборд</span>
                </a>
                <a href="{% url 'history' %}" class="nav-link {% if request.path == '/routes/' or request.path == '/history/' %}active{% endif %}">
                    <i class="fas fa-map-marked-alt"></i>
                    <span>История</span>
                </a>
                <a href="{% url 'device_list' %}" class="nav-link {% if '/devices/' in request.path %}active{% endif %}">
                    <i class="fas fa-bicycle"></i>
                    <span>Устройства</span>
                </a>
            </div>
            
            <!-- Нижняя секция с кнопкой выхода -->
            <div class="sidebar-footer mt-auto">
                <div class="user-info px-3 py-2 border-top">
                    <div class="d-flex align-items-center">
                        <div class="avatar-placeholder">
                            <i class="fas fa-user"></i>
                        </div>
                        <div class="user-name ms-2">
                            {{ request.user.username }}
                        </div>
                    </div>
                    <form action="{% url 'logout' %}" method="post" class="mt-2">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-outline-danger btn-sm w-100">
                            <i class="fas fa-sign-out-alt me-1"></i> Выйти
                        </button>
                    </form>
                </div>
            </div>
        </div>
        {% endif %}
        
        <div class="main-content">
            <header class="app-header">
                {% block header_extras %}{% endblock %}
            </header>
            {% block content %}{% endblock %}
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
